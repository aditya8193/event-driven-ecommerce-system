name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Java
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3️⃣ Build all services (IMPORTANT)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # =========================
      # USER SERVICE
      # =========================
      - name: Build User Service Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service ./user-service

      - name: Push User Service Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/user-service

      # =========================
      # PRODUCT SERVICE
      # =========================
      - name: Build Product Service Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/product-service ./product-service

      - name: Push Product Service Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/product-service

      # =========================
      # ORDER SERVICE
      # =========================
      - name: Build Order Service Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service ./order-service

      - name: Push Order Service Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/order-service

      # =========================
      # PAYMENT SERVICE
      # =========================
      - name: Build Payment Service Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/payment-service ./payment-service

      - name: Push Payment Service Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/payment-service

      # =========================
      # API GATEWAY
      # =========================
      - name: Build API Gateway Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway ./api-gateway

      - name: Push API Gateway Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway