server:
  port: 8080

spring:
  redis:
    host: redis
    port: 6379

  cloud:
    gateway:
      routes:

        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/auth/**,/api/user/**,/api/admin/**
          filters:
            - StripPrefix=1

        - id: product-service
          uri: http://product-service:8082
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=1

        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1

        - id: payment-service
          uri: http://payment-service:8084
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1

jwt:
  secret: mysecretkeymysecretkeymysecretkey123

management:
  endpoints:
    web:
      exposure:
        include: health